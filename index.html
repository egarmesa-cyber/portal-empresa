<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zona Mixta | Portal</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #0f172a; overflow-x: hidden; }
        .trabajando { animation: pulse 2s infinite; color: #10b981; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .nav-link { display: flex; align-items: center; gap: 1rem; width: 100%; padding: 0.85rem 1rem; border-radius: 0.75rem; font-size: 0.85rem; font-weight: 700; color: #475569; transition: all 0.2s; }
        .nav-link svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2.5; fill: none; }
        .section-label { font-size: 0.6rem; font-weight: 800; color: #cbd5e1; text-transform: uppercase; letter-spacing: 0.15em; margin: 1.5rem 1rem 0.5rem; }
    </style>
</head>
<body class="antialiased">

    <div id="login-section" class="min-h-screen flex items-center justify-center p-6 bg-white transition-opacity duration-500">
        <div class="w-full max-w-sm text-center">
            <img src="logo.png" class="h-20 mx-auto mb-10" id="login-logo">
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-300 ml-2 tracking-widest italic">Identificación</label>
                    <input type="text" id="username" placeholder="Nombre exacto" class="w-full p-4 bg-slate-50 border border-slate-100 font-bold rounded-xl outline-none focus:ring-1 focus:ring-slate-900 mt-1">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-300 ml-2 tracking-widest italic">PIN Corporativo</label>
                    <input type="password" id="userpin" placeholder="••••" class="w-full p-4 bg-slate-50 border border-slate-100 font-bold rounded-xl outline-none focus:ring-1 focus:ring-slate-900 mt-1">
                </div>
                <button onclick="login()" id="btn-login" class="w-full bg-slate-900 text-white font-black py-5 rounded-xl uppercase text-[10px] tracking-widest mt-6 shadow-xl active:scale-95 transition-all">Acceder al Portal</button>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden max-w-md mx-auto p-4 pb-24">
        <header class="flex justify-between items-center py-8">
            <div class="flex items-center gap-4" onclick="toggleMenu()">
                <div class="w-14 h-14 rounded-2xl bg-slate-900 flex items-center justify-center text-white font-black text-xl border-2 border-white shadow-lg overflow-hidden">
                    <img id="user-photo" class="w-full h-full object-cover hidden">
                    <span id="user-initial"></span>
                </div>
                <div>
                    <h2 id="user-display" class="font-black italic text-xl uppercase tracking-tighter leading-none"></h2>
                    <div id="label-status" class="flex items-center gap-1.5 mt-0.5">
                        <span class="w-2 h-2 bg-slate-300 rounded-full"></span>
                        <span class="text-[8px] font-black uppercase text-slate-400 tracking-widest italic">Sincronizando...</span>
                    </div>
                </div>
            </div>
            <button onclick="toggleMenu()" class="p-3 bg-slate-50 rounded-xl text-slate-400">☰</button>
        </header>

        <main class="space-y-6">
            <img src="logo.png" class="h-14 mx-auto opacity-90 py-2">

            <div id="contador-card" class="hidden bg-slate-900 rounded-[2.5rem] p-8 text-white text-center shadow-2xl relative overflow-hidden">
                <p class="text-[9px] font-black opacity-40 uppercase tracking-widest mb-2 italic">Jornada Activa</p>
                <div id="timer-display" class="text-5xl font-black tracking-tighter trabajando">00:00:00</div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="fichar('ENTRADA')" class="bg-slate-900 text-white py-10 rounded-[2rem] font-black uppercase text-[10px] tracking-widest shadow-xl active:scale-95 transition-all">Entrada</button>
                <button onclick="fichar('SALIDA')" class="bg-slate-50 text-slate-900 py-10 rounded-[2rem] font-black uppercase text-[10px] tracking-widest border border-slate-200 active:scale-95 transition-all">Salida</button>
            </div>

            <div class="bg-white rounded-[2rem] p-6 border border-slate-100 shadow-sm">
                <h3 class="text-[9px] font-black text-slate-300 uppercase tracking-widest mb-4 text-center italic">Hoy</h3>
                <div id="historial-hoy" class="space-y-3"></div>
            </div>

            <div class="bg-white rounded-[2.2rem] p-2 border border-slate-100 shadow-sm overflow-hidden">
                <iframe src="https://calendar.google.com/calendar/embed?src=3478be3d2663273cc95476e4cb032667d5c7d05eba69fe8bf3aa43b73d3f45f8%40group.calendar.google.com&ctz=Europe%2FMadrid&showTitle=0&showNav=1&showDate=0&showPrint=0&showTabs=0&showCalendars=0&mode=AGENDA" 
                style="border: 0" width="100%" height="320" frameborder="0" scrolling="no"></iframe>
            </div>
        </main>
    </div>

    <div id="side-menu" class="fixed inset-0 z-[120] translate-x-full transition-transform duration-300">
        <div class="absolute inset-0 bg-slate-900/10 backdrop-blur-md" onclick="toggleMenu()"></div>
        <div class="absolute right-0 top-0 h-full w-72 bg-white shadow-2xl p-6 flex flex-col">
            <div class="flex items-center justify-center mb-8"><img src="logo.png" class="h-10"></div>
            <div class="flex-1 overflow-y-auto no-scrollbar">
                <p class="section-label">General</p>
                <button onclick="toggleMenu()" class="nav-link"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg> Dashboard</button>
                <button onclick="abrirDocumentos()" class="nav-link"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg> Documentos</button>
                <p class="section-label">Comunicación</p>
                <button onclick="abrirChat()" class="nav-link"><svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg> Chat Equipo</button>
            </div>
            <div class="mt-auto pt-6 border-t border-slate-50"><button onclick="logout()" class="w-full py-4 bg-slate-900 text-white rounded-xl font-bold text-[10px] uppercase tracking-widest shadow-lg">Salir</button></div>
        </div>
    </div>

    <div id="modal-form" class="fixed inset-0 z-[200] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="cerrarModal()"></div>
        <div class="relative w-full max-w-sm bg-white rounded-[2.5rem] p-8 shadow-2xl text-center">
            <h3 id="modal-titulo" class="text-lg font-black italic uppercase mb-6"></h3>
            <textarea id="modal-input" rows="4" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-1 focus:ring-slate-900 font-medium text-sm mb-4 resize-none"></textarea>
            <div class="flex gap-3">
                <button onclick="cerrarModal()" class="flex-1 py-4 bg-slate-100 rounded-xl font-bold text-[10px] uppercase text-slate-400">Cancelar</button>
                <button id="modal-btn-accion" class="flex-1 py-4 bg-slate-900 rounded-xl font-bold text-[10px] uppercase text-white">Enviar</button>
            </div>
        </div>
    </div>

    <div id="chat-window" class="fixed inset-0 z-[150] bg-white translate-y-full transition-transform duration-500 flex flex-col">
        <div class="p-8 border-b flex justify-between items-center bg-white">
            <h2 class="font-black italic uppercase tracking-tighter">Chat Interno</h2>
            <button onclick="cerrarChat()" class="text-[9px] font-black bg-slate-100 px-6 py-2 rounded-full uppercase">Cerrar</button>
        </div>
        <div id="chat-mensajes" class="flex-1 p-6 overflow-y-auto space-y-4 bg-slate-50"></div>
        <div class="p-4 bg-white border-t flex gap-3">
            <input type="text" id="chat-input" placeholder="Mensaje..." class="flex-1 p-4 bg-slate-50 rounded-xl outline-none font-bold text-sm">
            <button onclick="enviarMensaje()" class="bg-slate-900 text-white px-8 rounded-xl font-black uppercase text-[10px]">Enviar</button>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const SUPABASE_URL = 'https://rxrgjpbxtyeypsfqmlfu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_X2fBCNmVTPmgiPND_RrzOQ_8FpULiOm';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = localStorage.getItem('usuario_empresa');
        let timerInterval;

        // INICIO AUTOMÁTICO
        if(currentUser) { mostrarApp(); }

        async function login() {
            const name = document.getElementById('username').value.trim();
            const pin = document.getElementById('userpin').value.trim();
            const btn = document.getElementById('btn-login');

            if(!name || !pin) return alert("Completa usuario y PIN");
            
            btn.innerText = "VERIFICANDO...";

            try {
                const { data, error } = await _supabase.from('usuarios').select('*').eq('Nombre', name).eq('Pin', pin).single();
                if(data) {
                    localStorage.setItem('usuario_empresa', name);
                    currentUser = name;
                    mostrarApp();
                } else {
                    alert("Error: Nombre o PIN incorrecto.");
                    btn.innerText = "Acceder al Portal";
                }
            } catch (e) {
                alert("Error de conexión con la base de datos.");
                btn.innerText = "Acceder al Portal";
            }
        }

        function mostrarApp() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUser;
            
            _supabase.from('usuarios').select('foto').eq('Nombre', currentUser).single().then(({data}) => {
                if(data && data.foto) {
                    document.getElementById('user-photo').src = data.foto;
                    document.getElementById('user-photo').classList.remove('hidden');
                    document.getElementById('user-initial').classList.add('hidden');
                } else {
                    document.getElementById('user-initial').innerText = currentUser.charAt(0).toUpperCase();
                }
            });

            cargarAviso();
            cargarRegistrosHoy();
        }

        async function cargarRegistrosHoy() {
            const hoy = new Date().toISOString().split('T')[0];
            const { data } = await _supabase.from('fichajes').select('*').eq('Usuario', currentUser).gte('created_at', hoy).order('created_at', { ascending: false });

            const lista = document.getElementById('historial-hoy');
            lista.innerHTML = "";
            const statusLabel = document.getElementById('label-status');
            
            if(data && data.length > 0) {
                data.forEach(f => {
                    const hora = new Date(f.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                    lista.innerHTML += `<div class="flex justify-between items-center bg-slate-50 p-4 rounded-2xl border border-slate-50">
                        <span class="text-[9px] font-black uppercase ${f.Tipo === 'ENTRADA' ? 'text-emerald-500' : 'text-rose-500'} italic">${f.Tipo}</span>
                        <span class="text-sm font-extrabold text-slate-800">${hora}</span>
                    </div>`;
                });

                if(data[0].Tipo === 'ENTRADA') {
                    iniciarTimer(data[0].created_at);
                    statusLabel.innerHTML = `<span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span><span class="text-[8px] font-black uppercase text-emerald-500 tracking-widest">Trabajando</span>`;
                } else {
                    document.getElementById('contador-card').classList.add('hidden');
                    statusLabel.innerHTML = `<span class="w-2 h-2 bg-slate-300 rounded-full"></span><span class="text-[8px] font-black uppercase text-slate-400 tracking-widest">Pausado</span>`;
                    clearInterval(timerInterval);
                }
            } else {
                lista.innerHTML = "<p class='text-[10px] text-center text-slate-300 font-bold uppercase'>Sin actividad hoy</p>";
            }
        }

        function iniciarTimer(fecha) {
            document.getElementById('contador-card').classList.remove('hidden');
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const diff = new Date() - new Date(fecha);
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('timer-display').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function fichar(tipo) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await _supabase.from('fichajes').insert([{ Usuario: currentUser, Tipo: tipo, Ubicacion: `${pos.coords.latitude},${pos.coords.longitude}` }]);
                cargarRegistrosHoy();
            }, () => alert("GPS Obligatorio"), { enableHighAccuracy: true });
        }

        // FUNCIONES EXTRA
        function toggleMenu() { document.getElementById('side-menu').classList.toggle('translate-x-full'); }
        function logout() { localStorage.removeItem('usuario_empresa'); location.reload(); }
        function abrirChat() { document.getElementById('chat-window').classList.remove('translate-y-full'); cargarMensajes(); 
            _supabase.channel('public:chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat' }, payload => { dibujarMensaje(payload.new); }).subscribe();
        }
        function cerrarChat() { document.getElementById('chat-window').classList.add('translate-y-full'); }
        async function cargarMensajes() {
            const { data } = await _supabase.from('chat').select('*').order('created_at', { ascending: true }).limit(50);
            const cont = document.getElementById('chat-mensajes'); cont.innerHTML = "";
            if(data) data.forEach(m => dibujarMensaje(m));
        }
        function dibujarMensaje(m) {
            const cont = document.getElementById('chat-mensajes');
            const esMio = m.nombre === currentUser;
            const div = document.createElement('div');
            div.className = `flex ${esMio ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="${esMio ? 'bg-slate-900 text-white rounded-l-2xl rounded-tr-2xl shadow-xl' : 'bg-white text-slate-800 rounded-r-2xl rounded-tl-2xl border border-slate-100'} p-4 max-w-[85%] shadow-sm"><p class="text-[7px] font-black opacity-30 mb-1 uppercase tracking-widest">${m.nombre}</p><p class="font-bold text-xs">${m.mensaje}</p></div>`;
            cont.appendChild(div); cont.scrollTop = cont.scrollHeight;
        }
        async function enviarMensaje() {
            const input = document.getElementById('chat-input'); if(!input.value.trim()) return;
            await _supabase.from('chat').insert([{ nombre: currentUser, mensaje: input.value }]); input.value = "";
        }
        async function cargarAviso() {
            const { data } = await _supabase.from('avisos').select('mensaje').order('created_at', { ascending: false }).limit(1).single();
            if(data) document.getElementById('muro-texto').innerText = data.mensaje;
        }
        async function abrirDocumentos() {
            const { data } = await _supabase.from('usuarios').select('documentos_url').eq('Nombre', currentUser).single();
            if(data?.documentos_url) window.open(data.documentos_url, '_blank'); else alert("Sin documentos.");
        }
    </script>
</body>
</html>
