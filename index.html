<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zona Mixta | Portal Premium</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #0f172a; overflow-x: hidden; }
        .trabajando { animation: pulse 2s infinite; color: #10b981; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .nav-link { display: flex; align-items: center; gap: 1rem; width: 100%; padding: 0.85rem 1rem; border-radius: 0.75rem; font-size: 0.85rem; font-weight: 700; color: #475569; transition: all 0.2s; }
        .nav-link:active { background-color: #f8fafc; color: #0f172a; transform: scale(0.98); }
        .nav-link svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2.5; fill: none; }
        .section-label { font-size: 0.6rem; font-weight: 800; color: #cbd5e1; text-transform: uppercase; letter-spacing: 0.15em; margin: 1.5rem 1rem 0.5rem; }
    </style>
</head>
<body class="antialiased">

    <div id="modal-form" class="fixed inset-0 z-[200] hidden items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="cerrarModal()"></div>
        <div class="relative w-full max-w-sm bg-white rounded-[2.5rem] p-8 shadow-2xl">
            <h3 id="modal-titulo" class="text-lg font-black italic uppercase tracking-tighter mb-6 text-center text-slate-900"></h3>
            <textarea id="modal-input" rows="4" class="w-full p-4 bg-slate-50 rounded-2xl border border-slate-100 outline-none focus:ring-1 focus:ring-slate-900 font-medium text-sm mb-4 resize-none" placeholder="Escribe aquí..."></textarea>
            <div class="flex gap-3">
                <button onclick="cerrarModal()" class="flex-1 py-4 bg-slate-100 rounded-xl font-bold text-[10px] uppercase tracking-widest text-slate-400">Cancelar</button>
                <button id="modal-btn-accion" class="flex-1 py-4 bg-slate-900 rounded-xl font-bold text-[10px] uppercase tracking-widest text-white shadow-lg">Enviar</button>
            </div>
        </div>
    </div>

    <div id="login-section" class="min-h-screen flex items-center justify-center p-6 bg-white transition-opacity duration-500">
        <div class="w-full max-w-sm text-center">
            <img src="logo.png" class="h-24 mx-auto mb-10" onerror="this.style.display='none'">
            <div class="space-y-4 text-left">
                <label class="text-[9px] font-black uppercase text-slate-300 ml-2 tracking-widest italic">Identificación</label>
                <input type="text" id="username" placeholder="Nombre de usuario" class="w-full p-4 bg-slate-50 border border-slate-100 font-bold rounded-xl outline-none focus:ring-1 focus:ring-slate-900">
                <label class="text-[9px] font-black uppercase text-slate-300 ml-2 tracking-widest italic">PIN Corporativo</label>
                <input type="password" id="userpin" placeholder="••••" class="w-full p-4 bg-slate-50 border border-slate-100 font-bold rounded-xl outline-none focus:ring-1 focus:ring-slate-900">
                <button onclick="login()" id="btn-login" class="w-full bg-slate-900 text-white font-black py-5 rounded-xl uppercase text-[10px] tracking-widest mt-6 shadow-xl active:scale-95 transition-all">Acceder al Sistema</button>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden max-w-md mx-auto p-4 pb-24">
        <header class="flex justify-between items-center py-8">
            <div class="flex items-center gap-4" onclick="toggleMenu()">
                <div class="w-14 h-14 rounded-2xl bg-slate-900 flex items-center justify-center text-white font-black text-xl border-2 border-white shadow-lg overflow-hidden">
                    <img id="user-photo" class="w-full h-full object-cover hidden">
                    <span id="user-initial"></span>
                </div>
                <div>
                    <h2 id="user-display" class="font-black italic text-xl uppercase tracking-tighter leading-none"></h2>
                    <div id="label-status" class="flex items-center gap-1.5 mt-0.5">
                        <span class="w-2 h-2 bg-slate-300 rounded-full"></span>
                        <span class="text-[8px] font-black uppercase text-slate-400 tracking-widest italic">Sincronizando...</span>
                    </div>
                </div>
            </div>
            <button onclick="toggleMenu()" class="p-3 bg-slate-50 rounded-xl text-slate-400">☰</button>
        </header>

        <main class="space-y-6">
            <img src="logo.png" class="h-14 mx-auto opacity-80 py-2" onerror="this.style.display='none'">

            <div id="contador-card" class="hidden bg-slate-900 rounded-[2.5rem] p-8 text-white text-center shadow-2xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-5 text-4xl font-black italic uppercase">Working</div>
                <p class="text-[9px] font-black opacity-40 uppercase tracking-widest mb-2 italic">Tiempo de Jornada Actual</p>
                <div id="timer-display" class="text-5xl font-black tracking-tighter trabajando">00:00:00</div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="fichar('ENTRADA')" class="bg-slate-900 text-white py-10 rounded-[2rem] font-black uppercase text-[10px] tracking-widest shadow-xl active:scale-95 transition-all">Entrada</button>
                <button onclick="fichar('SALIDA')" class="bg-slate-50 text-slate-900 py-10 rounded-[2rem] font-black uppercase text-[10px] tracking-widest border border-slate-200 active:scale-95 transition-all">Salida</button>
            </div>

            <div class="bg-white rounded-[2rem] p-6 border border-slate-100 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[9px] font-black text-slate-300 uppercase tracking-widest italic">Mi Asistencia Mensual</h3>
                    <span id="horas-mes" class="text-[10px] font-black text-slate-900 bg-slate-50 px-3 py-1 rounded-full italic text-slate-900">0h 0m</span>
                </div>
                <div id="calendario-personal" class="grid grid-cols-7 gap-1"></div>
            </div>

            <div class="bg-white rounded-[2rem] p-6 border border-slate-100 shadow-sm">
                <h3 class="text-[9px] font-black text-slate-300 uppercase tracking-widest mb-4 text-center italic text-slate-900">Hoy</h3>
                <div id="historial-hoy" class="space-y-3"></div>
            </div>

            <div class="bg-slate-900 rounded-[2.2rem] p-8 text-white shadow-xl relative overflow-hidden text-center">
                <p id="muro-texto" class="text-sm font-bold italic leading-tight">Cargando avisos oficiales...</p>
            </div>

            <div class="bg-white rounded-[2.2rem] p-2 border border-slate-100 shadow-sm overflow-hidden">
                <iframe src="https://calendar.google.com/calendar/embed?src=3478be3d2663273cc95476e4cb032667d5c7d05eba69fe8bf3aa43b73d3f45f8%40group.calendar.google.com&ctz=Europe%2FMadrid&showTitle=0&showNav=1&showDate=0&showPrint=0&showTabs=0&showCalendars=0&mode=AGENDA" 
                style="border: 0" width="100%" height="320" frameborder="0" scrolling="no"></iframe>
            </div>
        </main>
    </div>

    <div id="chat-window" class="fixed inset-0 z-[150] bg-white translate-y-full transition-transform duration-500 flex flex-col">
        <div class="p-8 border-b flex justify-between items-center bg-white shadow-sm">
            <div>
                <h2 class="font-black italic uppercase tracking-tighter text-lg text-slate-900">Chat de Equipo</h2>
                <span class="text-[8px] text-slate-400 font-bold uppercase tracking-widest">Internal Communications</span>
            </div>
            <button onclick="cerrarChat()" class="text-[9px] font-black bg-slate-100 px-6 py-2 rounded-full uppercase text-slate-900">Cerrar</button>
        </div>
        <div id="chat-mensajes" class="flex-1 p-6 overflow-y-auto space-y-4 bg-slate-50 no-scrollbar"></div>
        <div class="p-4 bg-white border-t flex gap-3 shadow-2xl">
            <input type="text" id="chat-input" placeholder="Escribe un mensaje..." class="flex-1 p-4 bg-slate-50 rounded-xl outline-none font-bold text-sm text-slate-90
