<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZM | Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #0f172a; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        input { -webkit-appearance: none; border-radius: 0.75rem; }
    </style>
</head>
<body>

    <div id="login-section" class="min-h-screen flex items-center justify-center p-6 bg-white">
        <div class="w-full max-w-sm text-center">
            <img src="logo.png" class="h-24 mx-auto mb-10" onerror="this.style.display='none'">
            <div class="space-y-4">
                <div class="text-left">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2 tracking-widest">Usuario</label>
                    <input type="text" id="username" placeholder="Nombre exacto" class="w-full p-4 bg-slate-50 border border-slate-100 font-bold outline-none focus:ring-2 focus:ring-slate-900 mt-1">
                </div>
                <div class="text-left">
                    <label class="text-[10px] font-black uppercase text-slate-400 ml-2 tracking-widest">Pin de Acceso</label>
                    <input type="password" id="userpin" placeholder="••••" class="w-full p-4 bg-slate-50 border border-slate-100 font-bold outline-none focus:ring-2 focus:ring-slate-900 mt-1">
                </div>
                <button onclick="login()" id="btn-login" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl uppercase text-[11px] tracking-widest active:scale-95 transition-all mt-6 shadow-xl shadow-slate-200">
                    Entrar al Portal
                </button>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden max-w-md mx-auto p-4 pb-24">
        <header class="flex justify-between items-center py-8">
            <div class="flex items-center gap-4" onclick="toggleMenu()">
                <div class="w-14 h-14 rounded-2xl bg-slate-900 flex items-center justify-center text-white font-black text-xl border-2 border-white shadow-lg overflow-hidden">
                    <img id="user-photo" class="w-full h-full object-cover hidden">
                    <span id="user-initial"></span>
                </div>
                <div>
                    <h2 id="user-display" class="font-black italic text-xl uppercase tracking-tighter"></h2>
                    <span class="text-[8px] font-black uppercase text-emerald-500 tracking-widest">Sincronizado</span>
                </div>
            </div>
            <button onclick="toggleMenu()" class="p-3 bg-slate-50 rounded-xl text-slate-400">☰</button>
        </header>

        <main class="space-y-6">
            <img src="logo.png" class="h-14 mx-auto opacity-80" onerror="this.style.display='none'">

            <div class="grid grid-cols-2 gap-4">
                <button onclick="fichar('ENTRADA')" class="bg-slate-900 text-white py-10 rounded-[2rem] font-black uppercase text-[10px] tracking-widest shadow-xl active:scale-95 transition-all">Entrada</button>
                <button onclick="fichar('SALIDA')" class="bg-slate-50 text-slate-900 py-10 rounded-[2rem] font-black uppercase text-[10px] tracking-widest border border-slate-200 active:scale-95 transition-all">Salida</button>
            </div>

            <div class="bg-white rounded-[2rem] p-6 border border-slate-100 shadow-sm flex justify-around items-center text-center">
                <div>
                    <p class="text-[7px] font-black text-slate-300 uppercase mb-1">Check-in</p>
                    <p id="h-entrada" class="text-lg font-black text-slate-800">--:--</p>
                </div>
                <div class="h-8 w-px bg-slate-100"></div>
                <div>
                    <p class="text-[7px] font-black text-slate-300 uppercase mb-1">Check-out</p>
                    <p id="h-salida" class="text-lg font-black text-slate-800">--:--</p>
                </div>
            </div>

            <div class="bg-slate-900 rounded-[2.2rem] p-8 text-white shadow-xl relative overflow-hidden">
                <p id="muro-texto" class="text-sm font-bold italic text-center">Cargando avisos corporativos...</p>
            </div>

            <div class="bg-white rounded-[2.2rem] p-2 border border-slate-100 shadow-sm overflow-hidden">
                <iframe src="https://calendar.google.com/calendar/embed?src=3478be3d2663273cc95476e4cb032667d5c7d05eba69fe8bf3aa43b73d3f45f8%40group.calendar.google.com&ctz=Europe%2FMadrid&showTitle=0&showNav=1&showDate=0&showPrint=0&showTabs=0&showCalendars=0&mode=AGENDA" 
                style="border: 0" width="100%" height="320" frameborder="0" scrolling="no"></iframe>
            </div>
        </main>
    </div>

    <div id="side-menu" class="fixed inset-0 z-[80] translate-x-full transition-transform duration-300">
        <div class="absolute inset-0 bg-slate-900/10 backdrop-blur-md" onclick="toggleMenu()"></div>
        <div class="absolute right-0 top-0 h-full w-72 bg-white shadow-2xl p-8 flex flex-col">
            <button onclick="toggleMenu()" class="text-right text-slate-400 font-bold mb-10">✕</button>
            <nav class="space-y-4 flex-1">
                <button onclick="abrirDocumentos()" class="w-full text-left font-bold py-2 border-b border-slate-50">📁 Documentos</button>
                <button onclick="abrirChat()" class="w-full text-left font-bold py-2 border-b border-slate-50">💬 Chat Equipo</button>
                <button onclick="logout()" class="w-full text-left font-bold py-2 text-rose-500">🚪 Salir</button>
            </nav>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rxrgjpbxtyeypsfqmlfu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_X2fBCNmVTPmgiPND_RrzOQ_8FpULiOm';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = localStorage.getItem('usuario_empresa');

        if(currentUser) { mostrarApp(); }

        async function login() {
            const btn = document.getElementById('btn-login');
            const name = document.getElementById('username').value.trim();
            const pin = document.getElementById('userpin').value.trim();

            if(!name || !pin) return alert("Introduce usuario y PIN");
            
            btn.innerText = "VERIFICANDO...";
            
            try {
                const { data, error } = await _supabase
                    .from('usuarios')
                    .select('*')
                    .eq('Nombre', name)
                    .eq('Pin', pin)
                    .single();

                if(error || !data) {
                    alert("Datos incorrectos. Revisa mayúsculas.");
                    btn.innerText = "ENTRAR AL PORTAL";
                } else {
                    localStorage.setItem('usuario_empresa', name);
                    currentUser = name;
                    mostrarApp();
                }
            } catch (e) {
                alert("Error de conexión. Revisa internet.");
                btn.innerText = "ENTRAR AL PORTAL";
            }
        }

        async function mostrarApp() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUser;
            
            const { data } = await _supabase.from('usuarios').select('foto').eq('Nombre', currentUser).single();
            if(data && data.foto) {
                document.getElementById('user-photo').src = data.foto;
                document.getElementById('user-photo').classList.remove('hidden');
                document.getElementById('user-initial').classList.add('hidden');
            } else {
                document.getElementById('user-initial').innerText = currentUser.charAt(0).toUpperCase();
            }
            cargarAviso(); cargarHoras();
        }

        async function fichar(tipo) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await _supabase.from('fichajes').insert([{ Usuario: currentUser, Tipo: tipo, Ubicacion: `${pos.coords.latitude},${pos.coords.longitude}` }]);
                cargarHoras();
                alert("Registrado: " + tipo);
            });
        }

        async function cargarHoras() {
            const hoy = new Date().toISOString().split('T')[0];
            const { data } = await _supabase.from('fichajes').select('*').eq('Usuario', currentUser).gte('created_at', hoy);
            if(data) {
                const ent = data.find(f => f.Tipo === 'ENTRADA');
                const sal = data.find(f => f.Tipo === 'SALIDA');
                if(ent) document.getElementById('h-entrada').innerText = new Date(ent.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                if(sal) document.getElementById('h-salida').innerText = new Date(sal.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            }
        }

        async function cargarAviso() {
            const { data } = await _supabase.from('avisos').select('mensaje').order('created_at', { ascending: false }).limit(1).single();
            if(data) document.getElementById('muro-texto').innerText = data.mensaje;
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('translate-x-full'); }
        function logout() { localStorage.removeItem('usuario_empresa'); location.reload(); }
        function abrirDocumentos() { alert("Abriendo documentos..."); }
        function abrirChat() { alert("Abriendo chat..."); }
    </script>
</body>
</html>
