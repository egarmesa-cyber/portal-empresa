<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Zona Mixta</title>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

    <div id="login-section" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-sm border border-gray-100 text-center">
            <img src="logo.png" alt="Logo" class="h-24 mx-auto mb-4 object-contain" onerror="this.src='https://via.placeholder.com/150?text=Logo+ZM'">
            <h2 class="text-2xl font-black text-gray-800">Zona Mixta</h2>
            <p class="text-gray-400 text-sm mb-8">Acceso con PIN</p>
            <input type="text" id="username" placeholder="Nombre de empleado" class="w-full p-4 bg-gray-50 rounded-2xl mb-4 text-center font-bold outline-none ring-blue-500 focus:ring-2">
            <button onclick="login()" class="w-full bg-blue-600 text-white font-bold py-4 rounded-2xl shadow-lg hover:bg-blue-700 transition-all">ENTRAR</button>
        </div>
    </div>

    <div id="app-section" class="hidden max-w-md mx-auto p-4">
        <header class="flex justify-between items-center py-6">
            <div>
                <h1 class="text-xl font-black text-gray-800 tracking-tight">Hola, <span id="user-display" class="text-blue-600"></span></h1>
                <p id="fecha" class="text-[10px] text-gray-400 font-bold uppercase"></p>
            </div>
            <button onclick="logout()" class="text-xs font-bold text-gray-400 border border-gray-200 px-3 py-1 rounded-full">Salir</button>
        </header>

        <div class="bg-blue-600 rounded-3xl p-6 shadow-xl mb-8 text-white">
            <h3 class="text-xs font-bold opacity-80 uppercase mb-1">Muro de Avisos</h3>
            <p class="text-lg font-medium italic">¡Bienvenidos! Recordad activar el GPS al fichar.</p>
        </div>

        <div class="bg-white rounded-3xl p-8 shadow-sm border border-gray-100 text-center">
            <div id="status" class="mb-6 text-xs font-black text-gray-400 uppercase tracking-widest">Listo para fichar</div>
            <div class="grid grid-cols-1 gap-6">
                <button onclick="fichar('ENTRADA')" class="bg-emerald-500 hover:bg-emerald-600 text-white py-6 rounded-3xl font-black text-xl shadow-lg active:scale-95 transition-all">ENTRADA</button>
                <button onclick="fichar('SALIDA')" class="bg-rose-500 hover:bg-rose-600 text-white py-6 rounded-3xl font-black text-xl shadow-lg active:scale-95 transition-all">SALIDA</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rxrgjpbxtyeypsfqmlfu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_X2fBCNmVTPmgiPND_RrzOQ_8FpULiOm';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = localStorage.getItem('usuario_empresa');
        if(currentUser) { mostrarApp(); }

        async function login() {
            const name = document.getElementById('username').value.trim();
            if (!name) return alert("Pon tu nombre");
            const pinInput = prompt("PIN de seguridad:");
            if (!pinInput) return;

            const { data, error } = await _supabase
                .from('usuarios')
                .select('*')
                .eq('Nombre', name)
                .eq('Pin', pinInput)
                .single();

            if (error || !data) {
                alert("Acceso denegado: Nombre o PIN incorrectos");
            } else {
                localStorage.setItem('usuario_empresa', name);
                currentUser = name;
                mostrarApp();
            }
        }

        function mostrarApp() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUser;
            document.getElementById('fecha').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' });
        }

        async function fichar(tipo) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "Localizando...";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const coords = `${pos.coords.latitude}, ${pos.coords.longitude}`;
                
                // He eliminado 'Hora_Local' para que no de error
                const { error } = await _supabase
                    .from('fichajes')
                    .insert([{ Usuario: currentUser, Tipo: tipo, Ubicacion: coords }]);

                if (error) {
                    alert("Error: " + error.message);
                } else {
                    statusDiv.innerText = "✅ " + tipo + " REGISTRADA";
                    statusDiv.className = "mb-6 text-xs font-black text-emerald-500 uppercase tracking-widest";
                }
            }, (err) => {
                alert("Activa el GPS para fichar.");
                statusDiv.innerText = "Error: GPS necesario";
            });
        }

        function logout() {
            localStorage.removeItem('usuario_empresa');
            location.reload();
        }
    </script>
</body>
</html>
