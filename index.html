<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zona Mixta | Business</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .menu-item { display: flex; align-items: center; gap: 1rem; padding: 1rem; border-radius: 1rem; transition: all 0.2s; width: 100%; text-align: left; }
        .menu-item:active { background-color: #f1f5f9; transform: scale(0.98); }
        .section-title { font-size: 0.65rem; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 0.75rem; margin-top: 1.5rem; }
        .chat-container { height: 70vh; overflow-y: auto; }
        .trabajando { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <div id="side-menu" class="fixed inset-0 z-50 translate-x-full transition-transform duration-300 ease-in-out">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-md" onclick="toggleMenu()"></div>
        <div class="absolute right-0 top-0 h-full w-80 bg-white shadow-2xl p-6 flex flex-col overflow-y-auto">
            
            <div class="flex justify-between items-center mb-8">
                <span class="font-extrabold italic text-xl tracking-tighter text-slate-800">ZONA MIXTA</span>
                <button onclick="toggleMenu()" class="p-2 bg-slate-100 rounded-full text-slate-400 text-xs font-bold">✕</button>
            </div>

            <div class="section-title">Mi Perfil</div>
            <button onclick="editarFoto()" class="menu-item">
                <div class="w-10 h-10 bg-blue-100 rounded-xl flex items-center justify-center text-blue-600">👤</div>
                <div class="flex flex-col">
                    <span class="font-bold text-sm">Gestionar Perfil</span>
                    <span class="text-[10px] text-slate-400">Cambiar foto y datos</span>
                </div>
            </button>

            <div class="section-title">Operaciones</div>
            <button onclick="alert('Próximamente: Listado de tareas diarias')" class="menu-item text-slate-400">
                <div class="w-10 h-10 bg-amber-100 rounded-xl flex items-center justify-center text-amber-600 opacity-50">📋</div>
                <div class="flex flex-col">
                    <span class="font-bold text-sm">Mis Tareas</span>
                    <span class="text-[10px]">Asignaciones del día</span>
                </div>
            </button>

            <div class="section-title">Documentos</div>
            <button onclick="abrirDocumentos()" class="menu-item">
                <div class="w-10 h-10 bg-emerald-100 rounded-xl flex items-center justify-center text-emerald-600">📁</div>
                <div class="flex flex-col">
                    <span class="font-bold text-sm">Repositorio Personal</span>
                    <span class="text-[10px] text-slate-400">Nóminas y contratos</span>
                </div>
            </button>

            <div class="section-title">Comunicación</div>
            <button onclick="abrirChat()" class="menu-item">
                <div class="w-10 h-10 bg-indigo-100 rounded-xl flex items-center justify-center text-indigo-600">💬</div>
                <div class="flex flex-col">
                    <span class="font-bold text-sm">Chat de Equipo</span>
                    <span class="text-[10px] text-slate-400">Mensajería interna</span>
                </div>
            </button>

            <div class="mt-auto pt-8 border-t border-slate-100">
                <button onclick="logout()" class="w-full py-4 bg-rose-50 text-rose-600 rounded-2xl font-bold text-xs uppercase tracking-widest active:scale-95 transition-all">
                    Cerrar Sesión Corporativa
                </button>
            </div>
        </div>
    </div>

    <div id="login-section" class="flex items-center justify-center min-h-screen p-6 bg-slate-900">
        <div class="bg-white p-10 rounded-[2.5rem] shadow-2xl w-full max-w-sm text-center">
            <img src="logo.png" class="h-20 mx-auto mb-8" onerror="this.src='https://via.placeholder.com/150?text=ZM'">
            <h2 class="text-2xl font-extrabold italic uppercase tracking-tighter mb-1 text-slate-800">Zona Mixta</h2>
            <p class="text-[10px] mb-8 font-bold text-slate-400 uppercase tracking-widest">Portal de Empleado</p>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Usuario" class="w-full p-4 bg-slate-50 rounded-2xl text-center font-semibold outline-none focus:ring-2 focus:ring-blue-600">
                <button onclick="login()" class="w-full bg-slate-800 text-white font-extrabold py-4 rounded-2xl shadow-xl active:scale-95 transition-all uppercase text-xs tracking-widest">Autenticar</button>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden max-w-md mx-auto p-4 pb-20">
        <header class="flex justify-between items-center py-6">
            <div class="flex items-center gap-3 cursor-pointer" onclick="toggleMenu()">
                <div class="relative">
                    <div class="w-14 h-14 rounded-2xl bg-blue-600 flex items-center justify-center text-white font-black text-xl overflow-hidden shadow-lg border-2 border-white">
                        <span id="user-initial"></span>
                        <img id="user-photo" class="hidden w-full h-full object-cover">
                    </div>
                </div>
                <div>
                    <h1 class="text-lg font-extrabold italic uppercase leading-none text-slate-800"><span id="user-display"></span></h1>
                    <p class="text-[9px] text-blue-600 font-bold uppercase tracking-widest mt-1">Panel de Control ➔</p>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 gap-6">
            
            <div class="bg-slate-900 rounded-3xl p-6 shadow-xl text-white relative overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10 font-black italic text-4xl">ZM</div>
                <h3 class="text-[9px] font-black opacity-40 uppercase mb-2 tracking-widest">Comunicado General</h3>
                <p id="muro-texto" class="font-semibold text-base leading-snug italic">Cargando anuncios...</p>
            </div>

            <div id="cronometro-box" class="hidden bg-white rounded-3xl p-6 border border-slate-100 shadow-sm text-center">
                <p class="text-[9px] font-black text-slate-400 uppercase tracking-widest mb-2">Jornada Activa</p>
                <div id="tiempo-transcurrido" class="text-4xl font-black text-slate-800 trabajando tracking-tighter">00:00:00</div>
            </div>

            <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 text-center">
                <div id="status" class="mb-6 text-[10px] font-bold text-slate-300 uppercase tracking-widest italic leading-none">Seleccionar acción de fichaje</div>
                <div class="grid grid-cols-2 gap-4">
                    <button onclick="fichar('ENTRADA')" class="bg-emerald-500 text-white py-8 rounded-3xl font-black text-lg shadow-lg active:scale-95 transition-all shadow-emerald-100">ENTRADA</button>
                    <button onclick="fichar('SALIDA')" class="bg-rose-500 text-white py-8 rounded-3xl font-black text-lg shadow-lg active:scale-95 transition-all shadow-rose-100">SALIDA</button>
                </div>
            </div>

            <div class="bg-white rounded-3xl p-4 shadow-sm border border-slate-100">
                <h3 class="text-[9px] font-black text-slate-400 uppercase mb-4 tracking-widest text-center">Planificación de Eventos</h3>
                <div class="rounded-2xl overflow-hidden grayscale-[0.5] focus-within:grayscale-0">
                    <iframe src="https://calendar.google.com/calendar/embed?src=3478be3d2663273cc95476e4cb032667d5c7d05eba69fe8bf3aa43b73d3f45f8%40group.calendar.google.com&ctz=Europe%2FMadrid&showTitle=0&showNav=1&showDate=0&showPrint=0&showTabs=0&showCalendars=0&mode=AGENDA" 
                            style="border: 0" width="100%" height="250" frameborder="0" scrolling="no"></iframe>
                </div>
            </div>
        </div>
    </div>

    <div id="chat-window" class="fixed inset-0 z-[60] bg-white translate-y-full transition-transform duration-400 ease-in-out flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-slate-900 text-white">
            <div class="flex flex-col">
                <h2 class="font-extrabold italic uppercase tracking-tighter text-sm">Chat Interno</h2>
                <span class="text-[8px] text-slate-400 uppercase font-bold">Zona Mixta Communications</span>
            </div>
            <button onclick="cerrarChat()" class="text-[10px] font-bold bg-white/10 px-4 py-2 rounded-full uppercase">Regresar</button>
        </div>
        <div id="chat-mensajes" class="flex-1 p-6 overflow-y-auto space-y-4 bg-slate-50 chat-container"></div>
        <div class="p-4 border-t bg-white flex gap-2 shadow-2xl">
            <input type="text" id="chat-input" placeholder="Escribir mensaje corporativo..." class="flex-1 p-4 bg-slate-100 rounded-2xl outline-none font-medium text-sm">
            <button onclick="enviarMensaje()" class="bg-slate-900 text-white px-6 rounded-2xl font-black uppercase text-[10px]">Enviar</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rxrgjpbxtyeypsfqmlfu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_X2fBCNmVTPmgiPND_RrzOQ_8FpULiOm';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = localStorage.getItem('usuario_empresa');
        let userFoto = "";
        let timerInterval;

        if(currentUser) { mostrarApp(); }

        async function login() {
            const name = document.getElementById('username').value.trim();
            if (!name) return;
            const pinInput = prompt("Clave de Seguridad (PIN):");
            const { data } = await _supabase.from('usuarios').select('*').eq('Nombre', name).eq('Pin', pinInput).single();
            if (data) { localStorage.setItem('usuario_empresa', name); currentUser = name; mostrarApp(); }
            else { alert("Credenciales incorrectas."); }
        }

        async function mostrarApp() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUser;
            const { data } = await _supabase.from('usuarios').select('foto').eq('Nombre', currentUser).single();
            if (data && data.foto) {
                userFoto = data.foto;
                document.getElementById('user-photo').src = data.foto;
                document.getElementById('user-photo').classList.remove('hidden');
            } else {
                document.getElementById('user-initial').innerText = currentUser.charAt(0).toUpperCase();
            }
            cargarAviso();
            cargarHistorial();
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('translate-x-full'); }

        async function editarFoto() {
            const link = prompt("Enlace de la nueva imagen de perfil:");
            if (link) {
                await _supabase.from('usuarios').update({ foto: link }).eq('Nombre', currentUser);
                location.reload();
            }
        }

        function abrirChat() {
            document.getElementById('chat-window').classList.remove('translate-y-full');
            cargarMensajes();
            _supabase.channel('public:chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat' }, payload => {
                dibujarMensaje(payload.new);
            }).subscribe();
        }

        function cerrarChat() { document.getElementById('chat-window').classList.add('translate-y-full'); }

        async function cargarMensajes() {
            const { data } = await _supabase.from('chat').select('*').order('created_at', { ascending: true }).limit(50);
            const cont = document.getElementById('chat-mensajes');
            cont.innerHTML = "";
            if (data) data.forEach(m => dibujarMensaje(m));
        }

        function dibujarMensaje(m) {
            const cont = document.getElementById('chat-mensajes');
            const esMio = m.nombre === currentUser;
            const div = document.createElement('div');
            div.className = `flex ${esMio ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="${esMio ? 'bg-slate-900 text-white rounded-l-2xl rounded-tr-2xl' : 'bg-white text-slate-800 rounded-r-2xl rounded-tl-2xl border border-slate-100'} p-4 max-w-[85%] shadow-sm"><p class="text-[7px] font-black opacity-40 mb-1 uppercase">${m.nombre}</p><p class="text-xs font-semibold">${m.mensaje}</p></div>`;
            cont.appendChild(div);
            cont.scrollTop = cont.scrollHeight;
        }

        async function enviarMensaje() {
            const input = document.getElementById('chat-input');
            if (!input.value.trim()) return;
            await _supabase.from('chat').insert([{ nombre: currentUser, mensaje: input.value, foto: userFoto }]);
            input.value = "";
        }

        async function abrirDocumentos() {
            const { data } = await _supabase.from('usuarios').select('documentos_url').eq('Nombre', currentUser).single();
            if (data && data.documentos_url) window.open(data.documentos_url, '_blank');
            else alert("Acceso restringido o documentos no disponibles.");
        }

        async function cargarAviso() {
            const { data } = await _supabase.from('avisos').select('mensaje').order('created_at', { ascending: false }).limit(1).single();
            if (data) document.getElementById('muro-texto').innerText = data.mensaje;
        }

        async function cargarHistorial() {
            const { data } = await _supabase.from('fichajes').select('*').eq('Usuario', currentUser).order('created_at', { ascending: false }).limit(1);
            if (data && data.length > 0 && data[0].Tipo === 'ENTRADA') iniciarCronometro(data[0].created_at);
        }

        function iniciarCronometro(hora) {
            document.getElementById('cronometro-box').classList.remove('hidden');
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const diff = new Date() - new Date(hora);
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                document.getElementById('tiempo-transcurrido').innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function fichar(tipo) {
            document.getElementById('status').innerText = "AUTENTICANDO POSICIÓN...";
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const coords = `${pos.coords.latitude}, ${pos.coords.longitude}`;
                await _supabase.from('fichajes').insert([{ Usuario: currentUser, Tipo: tipo, Ubicacion: coords }]);
                document.getElementById('status').innerText = "REGISTRO COMPLETADO ✅";
                setTimeout(() => location.reload(), 1500);
            });
        }

        function logout() { localStorage.removeItem('usuario_empresa'); location.reload(); }
    </script>
</body>
</html>
