<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona Mixta Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .trabajando { animation: pulse-soft 2s infinite; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900">

    <div id="login-section" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-[2rem] shadow-xl w-full max-w-sm border border-slate-100 text-center">
            <img src="logo.png" class="h-20 mx-auto mb-4" onerror="this.src='https://via.placeholder.com/150?text=ZM'">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter">Zona Mixta</h2>
            <p class="text-slate-400 text-xs mb-8 font-bold uppercase tracking-widest">Portal del Empleado</p>
            <input type="text" id="username" placeholder="Tu nombre" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 text-center font-bold outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="login()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all">ACCEDER</button>
        </div>
    </div>

    <div id="app-section" class="hidden max-w-md mx-auto p-4 pb-10">
        <header class="flex justify-between items-center py-6">
            <div>
                <h1 class="text-xl font-black italic uppercase">Hola, <span id="user-display" class="text-blue-600"></span></h1>
                <p id="fecha" class="text-[10px] text-slate-400 font-black uppercase tracking-widest"></p>
            </div>
            <button onclick="logout()" class="text-[10px] font-black bg-slate-200 px-3 py-1 rounded-full uppercase">Salir</button>
        </header>

        <div class="bg-blue-600 rounded-[2rem] p-6 shadow-blue-200 shadow-xl mb-6 text-white">
            <h3 class="text-[10px] font-black opacity-70 uppercase mb-1">Comunicado Oficial</h3>
            <p id="muro-texto" class="text-sm font-bold">Cargando avisos...</p>
        </div>

        <div id="cronometro-box" class="hidden bg-white rounded-3xl p-4 mb-6 border border-slate-100 shadow-sm text-center">
            <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest">Jornada en curso</p>
            <div id="tiempo-transcurrido" class="text-3xl font-black text-slate-800 trabajando">00:00:00</div>
        </div>

        <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 text-center mb-6">
            <div id="status" class="mb-6 text-[10px] font-black text-slate-300 uppercase tracking-[0.2em]">Selecciona acción</div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="fichar('ENTRADA')" class="bg-emerald-500 hover:bg-emerald-600 text-white py-8 rounded-3xl font-black text-lg shadow-lg active:scale-95 transition-all shadow-emerald-100">ENTRADA</button>
                <button onclick="fichar('SALIDA')" class="bg-rose-500 hover:bg-rose-600 text-white py-8 rounded-3xl font-black text-lg shadow-lg active:scale-95 transition-all shadow-rose-100">SALIDA</button>
            </div>
        </div>

        <div class="bg-white rounded-3xl p-6 shadow-sm border border-slate-100">
            <h3 class="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-4 text-center text-center">Tus últimos registros</h3>
            <div id="historial-lista" class="space-y-3">
                </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rxrgjpbxtyeypsfqmlfu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_X2fBCNmVTPmgiPND_RrzOQ_8FpULiOm';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = localStorage.getItem('usuario_empresa');
        let timerInterval;

        if(currentUser) { mostrarApp(); }

        async function login() {
            const name = document.getElementById('username').value.trim();
            if (!name) return alert("Pon tu nombre");
            const pinInput = prompt("PIN de seguridad:");
            if (!pinInput) return;

            const { data, error } = await _supabase.from('usuarios').select('*').eq('Nombre', name).eq('Pin', pinInput).single();

            if (error || !data) {
                alert("Acceso denegado");
            } else {
                localStorage.setItem('usuario_empresa', name);
                currentUser = name;
                mostrarApp();
            }
        }

        async function mostrarApp() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUser;
            document.getElementById('fecha').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' });
            
            cargarAviso();
            cargarHistorial();
        }

        async function cargarAviso() {
            const { data } = await _supabase.from('avisos').select('mensaje').order('created_at', { ascending: false }).limit(1).single();
            if (data) document.getElementById('muro-texto').innerText = data.mensaje;
        }

        async function cargarHistorial() {
            const lista = document.getElementById('historial-lista');
            const { data } = await _supabase.from('fichajes').select('*').eq('Usuario', currentUser).order('created_at', { ascending: false }).limit(3);
            
            if (data && data.length > 0) {
                lista.innerHTML = data.map(f => `
                    <div class="flex justify-between items-center bg-slate-50 p-3 rounded-2xl border border-slate-100">
                        <span class="text-[10px] font-black ${f.Tipo === 'ENTRADA' ? 'text-emerald-500' : 'text-rose-500'} uppercase">${f.Tipo}</span>
                        <span class="text-xs font-bold text-slate-600">${new Date(f.created_at).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                    </div>
                `).join('');

                if (data[0].Tipo === 'ENTRADA') {
                    iniciarCronometro(data[0].created_at);
                } else {
                    document.getElementById('cronometro-box').classList.add('hidden');
                    clearInterval(timerInterval);
                }
            }
        }

        function iniciarCronometro(horaEntrada) {
            const box = document.getElementById('cronometro-box');
            const display = document.getElementById('tiempo-transcurrido');
            box.classList.remove('hidden');
            
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                const inicio = new Date(horaEntrada);
                const ahora = new Date();
                const diff = ahora - inicio;
                
                const h = Math.floor(diff / 3600000).toString().padStart(2, '0');
                const m = Math.floor((diff % 3600000) / 60000).toString().padStart(2, '0');
                const s = Math.floor((diff % 60000) / 1000).toString().padStart(2, '0');
                
                display.innerText = `${h}:${m}:${s}`;
            }, 1000);
        }

        async function fichar(tipo) {
            const statusDiv = document.getElementById('status');
            statusDiv.innerText = "LOCALIZANDO...";

            navigator.geolocation.getCurrentPosition(async (pos) => {
                const coords = `${pos.coords.latitude}, ${pos.coords.longitude}`;
                const { error } = await _supabase.from('fichajes').insert([{ Usuario: currentUser, Tipo: tipo, Ubicacion: coords }]);

                if (error) {
                    alert("Error");
                } else {
                    statusDiv.innerText = "✅ " + tipo + " OK";
                    cargarHistorial();
                }
            }, () => alert("Activa el GPS"));
        }

        function logout() {
            localStorage.removeItem('usuario_empresa');
            location.reload();
        }
    </script>
</body>
</html>
