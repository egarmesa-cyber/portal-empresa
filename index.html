<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zona Mixta | Portal Corporativo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #f8fafc; overflow-x: hidden; }
        .nav-button { display: flex; align-items: center; gap: 1rem; width: 100%; padding: 1rem; border-radius: 1rem; font-weight: 700; color: #1e293b; transition: all 0.2s; }
        .nav-button:active { background-color: #f1f5f9; transform: scale(0.98); }
        .nav-button span { font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="side-menu" class="fixed inset-0 z-50 translate-x-full transition-transform duration-300">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="toggleMenu()"></div>
        <div class="absolute right-0 top-0 h-full w-80 bg-white shadow-2xl p-8 flex flex-col">
            <div class="flex items-center justify-between mb-10 text-slate-900">
                <h2 class="font-black text-xl italic tracking-tighter uppercase">Zona Mixta</h2>
                <button onclick="toggleMenu()" class="text-slate-400">✕</button>
            </div>
            
            <nav class="space-y-1 flex-1">
                <p class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-4">Menú Corporativo</p>
                
                <button onclick="toggleMenu()" class="nav-button bg-slate-50">
                    <span>🏠</span> Inicio
                </button>

                <button onclick="abrirDocumentos()" class="nav-button">
                    <span>📁</span> Mis Documentos
                </button>

                <button onclick="abrirChat()" class="nav-button">
                    <span>💬</span> Chat de Equipo
                </button>

                <button onclick="reportarIncidencia()" class="nav-button">
                    <span>⚠️</span> Reportar Incidencia
                </button>

                <button onclick="window.open('https://calendar.google.com', '_blank')" class="nav-button">
                    <span>📅</span> Agenda Completa
                </button>
            </nav>

            <div class="pt-6 border-t border-slate-100">
                <button onclick="logout()" class="w-full p-4 bg-rose-50 text-rose-600 rounded-2xl font-black text-[10px] uppercase tracking-[0.2em]">
                    Finalizar Sesión
                </button>
            </div>
        </div>
    </div>

    <div id="login-section" class="min-h-screen flex items-center justify-center p-6 bg-slate-900">
        <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-sm text-center">
            <img src="logo.png" class="h-20 mx-auto mb-6" onerror="this.src='https://via.placeholder.com/150?text=ZM'">
            <h1 class="text-2xl font-black italic tracking-tighter mb-1 text-slate-900 uppercase">Zona Mixta</h1>
            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-10">Portal del Empleado</p>
            <div class="space-y-3">
                <input type="text" id="username" placeholder="Usuario" class="w-full p-4 bg-slate-50 rounded-2xl text-center font-bold outline-none focus:ring-2 focus:ring-blue-600">
                <button onclick="login()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl uppercase text-[10px] tracking-widest active:scale-95 transition-all">Acceder</button>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden max-w-md mx-auto p-4 pb-20">
        <header class="flex justify-between items-center py-6">
            <div class="flex items-center gap-3">
                <div class="w-12 h-12 rounded-2xl bg-blue-600 flex items-center justify-center text-white font-black text-xl shadow-lg border-2 border-white overflow-hidden">
                    <img id="user-photo" class="w-full h-full object-cover hidden">
                    <span id="user-initial"></span>
                </div>
                <div>
                    <h2 id="user-display" class="font-extrabold text-slate-900 leading-none"></h2>
                    <p class="text-[9px] text-blue-600 font-bold uppercase tracking-widest mt-1">Status: Conectado</p>
                </div>
            </div>
            <button onclick="toggleMenu()" class="p-3 bg-white rounded-xl shadow-sm border border-slate-100 font-bold">☰</button>
        </header>

        <main class="space-y-6">
            <div class="bg-white rounded-[2rem] p-6 shadow-sm border border-slate-100">
                <div class="flex justify-between items-center mb-6">
                    <h3 class="text-[10px] font-extrabold text-slate-400 uppercase tracking-widest italic">Horario de Hoy</h3>
                    <span id="fecha-txt" class="text-[9px] font-bold text-slate-300 uppercase"></span>
                </div>
                <div class="grid grid-cols-2 gap-3">
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 text-center">
                        <p class="text-[8px] font-black text-slate-400 uppercase mb-1">Entrada</p>
                        <p id="h-entrada" class="text-base font-black text-slate-800">--:--</p>
                    </div>
                    <div class="p-4 bg-slate-50 rounded-2xl border border-slate-100 text-center">
                        <p class="text-[8px] font-black text-slate-400 uppercase mb-1">Salida</p>
                        <p id="h-salida" class="text-base font-black text-slate-800">--:--</p>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="fichar('ENTRADA')" class="bg-emerald-500 text-white p-7 rounded-[1.8rem] font-black uppercase text-[10px] tracking-widest shadow-lg shadow-emerald-100 active:scale-95 transition-all">Fichar Entrada</button>
                <button onclick="fichar('SALIDA')" class="bg-rose-500 text-white p-7 rounded-[1.8rem] font-black uppercase text-[10px] tracking-widest shadow-lg shadow-rose-100 active:scale-95 transition-all">Fichar Salida</button>
            </div>

            <div class="bg-slate-900 rounded-[2rem] p-8 text-white relative shadow-xl overflow-hidden">
                <div class="absolute top-0 right-0 p-4 opacity-10 font-black italic text-3xl">ZM</div>
                <h4 class="text-[9px] font-black opacity-40 uppercase tracking-widest mb-3 text-center">Aviso de Dirección</h4>
                <p id="muro-texto" class="text-sm font-bold text-center italic leading-relaxed">Cargando avisos oficiales...</p>
            </div>

            <div class="bg-white rounded-[2rem] p-5 shadow-sm border border-slate-100">
                <h3 class="text-[9px] font-extrabold text-slate-400 uppercase tracking-widest text-center mb-4 italic text-slate-300">Próximos Partidos y Eventos</h3>
                <div class="rounded-2xl overflow-hidden border border-slate-50">
                    <iframe src="https://calendar.google.com/calendar/embed?src=3478be3d2663273cc95476e4cb032667d5c7d05eba69fe8bf3aa43b73d3f45f8%40group.calendar.google.com&ctz=Europe%2FMadrid&showTitle=0&showNav=1&showDate=0&showPrint=0&showTabs=0&showCalendars=0&mode=AGENDA" 
                    style="border: 0" width="100%" height="300" frameborder="0" scrolling="no"></iframe>
                </div>
            </div>
        </main>
    </div>

    <div id="chat-window" class="fixed inset-0 z-[60] bg-white translate-y-full transition-transform duration-500 flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-slate-900 text-white">
            <h2 class="font-black italic uppercase tracking-tighter text-sm">Chat Equipo Zona Mixta</h2>
            <button onclick="cerrarChat()" class="text-[9px] font-bold border border-white/20 px-4 py-2 rounded-full uppercase">Volver</button>
        </div>
        <div id="chat-mensajes" class="flex-1 p-6 overflow-y-auto space-y-4 bg-slate-50 text-xs"></div>
        <div class="p-4 bg-white border-t flex gap-2">
            <input type="text" id="chat-input" placeholder="Mensaje..." class="flex-1 p-4 bg-slate-100 rounded-2xl outline-none font-bold">
            <button onclick="enviarMensaje()" class="bg-slate-900 text-white px-6 rounded-2xl font-black uppercase text-[10px]">Enviar</button>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rxrgjpbxtyeypsfqmlfu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_X2fBCNmVTPmgiPND_RrzOQ_8FpULiOm';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = localStorage.getItem('usuario_empresa');

        if(currentUser) { mostrarApp(); }

        async function login() {
            const name = document.getElementById('username').value.trim();
            const pin = prompt("Introduce tu PIN Corporativo:");
            const { data } = await _supabase.from('usuarios').select('*').eq('Nombre', name).eq('Pin', pin).single();
            if(data) { localStorage.setItem('usuario_empresa', name); currentUser = name; mostrarApp(); }
            else alert("Acceso denegado.");
        }

        async function mostrarApp() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUser;
            document.getElementById('fecha-txt').innerText = new Date().toLocaleDateString('es-ES', { weekday: 'long', day: 'numeric', month: 'short' });
            
            const { data: user } = await _supabase.from('usuarios').select('foto').eq('Nombre', currentUser).single();
            if(user && user.foto) {
                const img = document.getElementById('user-photo'); img.src = user.foto; img.classList.remove('hidden');
                document.getElementById('user-initial').classList.add('hidden');
            } else { document.getElementById('user-initial').innerText = currentUser.charAt(0).toUpperCase(); }

            cargarAviso();
            cargarHoras();
        }

        async function cargarHoras() {
            const hoy = new Date().toISOString().split('T')[0];
            const { data } = await _supabase.from('fichajes').select('*').eq('Usuario', currentUser).gte('created_at', hoy);
            if(data) {
                const ent = data.find(f => f.Tipo === 'ENTRADA');
                const sal = data.find(f => f.Tipo === 'SALIDA');
                if(ent) document.getElementById('h-entrada').innerText = new Date(ent.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
                if(sal) document.getElementById('h-salida').innerText = new Date(sal.created_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
            }
        }

        async function fichar(tipo) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const { error } = await _supabase.from('fichajes').insert([{ Usuario: currentUser, Tipo: tipo, Ubicacion: `${pos.coords.latitude}, ${pos.coords.longitude}` }]);
                if(!error) { alert("Fichaje registrado."); cargarHoras(); }
            }, () => alert("Se necesita GPS."));
        }

        async function reportarIncidencia() {
            const msg = prompt("Describe la incidencia (material roto, retraso, problema técnico...):");
            if(msg) {
                await _supabase.from('incidencias').insert([{ usuario: currentUser, descripcion: msg, estado: 'Pendiente' }]);
                alert("Incidencia enviada al equipo de administración.");
            }
        }

        // CHAT
        function abrirChat() { document.getElementById('chat-window').classList.remove('translate-y-full'); cargarMensajes(); 
            _supabase.channel('public:chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat' }, payload => { dibujarMensaje(payload.new); }).subscribe();
        }
        function cerrarChat() { document.getElementById('chat-window').classList.add('translate-y-full'); }
        async function cargarMensajes() {
            const { data } = await _supabase.from('chat').select('*').order('created_at', { ascending: true }).limit(50);
            const cont = document.getElementById('chat-mensajes'); cont.innerHTML = "";
            if(data) data.forEach(m => dibujarMensaje(m));
        }
        function dibujarMensaje(m) {
            const cont = document.getElementById('chat-mensajes');
            const esMio = m.nombre === currentUser;
            const div = document.createElement('div');
            div.className = `flex ${esMio ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `<div class="${esMio ? 'bg-slate-900 text-white rounded-l-2xl rounded-tr-2xl' : 'bg-white text-slate-800 rounded-r-2xl rounded-tl-2xl border border-slate-100'} p-4 max-w-[85%] shadow-sm"><p class="text-[7px] font-black opacity-30 mb-1 uppercase">${m.nombre}</p><p class="font-bold">${m.mensaje}</p></div>`;
            cont.appendChild(div); cont.scrollTop = cont.scrollHeight;
        }
        async function enviarMensaje() {
            const input = document.getElementById('chat-input'); if(!input.value.trim()) return;
            await _supabase.from('chat').insert([{ nombre: currentUser, mensaje: input.value }]); input.value = "";
        }

        async function cargarAviso() {
            const { data } = await _supabase.from('avisos').select('mensaje').order('created_at', { ascending: false }).limit(1).single();
            if(data) document.getElementById('muro-texto').innerText = data.mensaje;
        }

        async function abrirDocumentos() {
            const { data } = await _supabase.from('usuarios').select('documentos_url').eq('Nombre', currentUser).single();
            if(data && data.documentos_url) window.open(data.documentos_url, '_blank'); else alert("Sin documentos asignados.");
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('translate-x-full'); }
        function logout() { localStorage.removeItem('usuario_empresa'); location.reload(); }
    </script>
</body>
</html>
