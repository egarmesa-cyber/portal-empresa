<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zona Mixta | Portal</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="logo.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #ffffff; color: #0f172a; overflow-x: hidden; }
        .trabajando { animation: pulse 2s infinite; color: #10b981; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .nav-link { display: flex; align-items: center; gap: 1rem; width: 100%; padding: 0.85rem 1rem; border-radius: 0.75rem; font-size: 0.85rem; font-weight: 700; color: #475569; transition: all 0.2s; }
        .nav-link svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2.5; fill: none; }
        .section-label { font-size: 0.6rem; font-weight: 800; color: #cbd5e1; text-transform: uppercase; letter-spacing: 0.15em; margin: 1.5rem 1rem 0.5rem; }
    </style>
</head>
<body class="antialiased">

    <div id="login-section" class="min-h-screen flex items-center justify-center p-6 bg-white transition-opacity duration-500">
        <div class="w-full max-w-sm text-center">
            <img src="logo.png" class="h-20 mx-auto mb-10" id="login-logo">
            <div class="space-y-4 text-left">
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-300 ml-2 tracking-widest italic">Identificación</label>
                    <input type="text" id="username" placeholder="Nombre exacto" class="w-full p-4 bg-slate-50 border border-slate-100 font-bold rounded-xl outline-none focus:ring-1 focus:ring-slate-900 mt-1">
                </div>
                <div>
                    <label class="text-[9px] font-black uppercase text-slate-300 ml-2 tracking-widest italic">PIN Corporativo</label>
                    <input type="password" id="userpin" placeholder="••••" class="w-full p-4 bg-slate-50 border border-slate-100 font-bold rounded-xl outline-none focus:ring-1 focus:ring-slate-900 mt-1">
                </div>
                <button onclick="login()" id="btn-login" class="w-full bg-slate-900 text-white font-black py-5 rounded-xl uppercase text-[10px] tracking-widest mt-6 shadow-xl active:scale-95 transition-all">Acceder al Portal</button>
            </div>
        </div>
    </div>

    <div id="app-section" class="hidden max-w-md mx-auto p-4 pb-24">
        <header class="flex justify-between items-center py-8 text-slate-900">
            <div class="flex items-center gap-4" onclick="toggleMenu()">
                <div class="w-14 h-14 rounded-2xl bg-slate-900 flex items-center justify-center text-white font-black text-xl border-2 border-white shadow-lg overflow-hidden">
                    <img id="user-photo" class="w-full h-full object-cover hidden">
                    <span id="user-initial"></span>
                </div>
                <div>
                    <h2 id="user-display" class="font-black italic text-xl uppercase tracking-tighter leading-none"></h2>
                    <div id="label-status" class="flex items-center gap-1.5 mt-0.5">
                        <span class="w-2 h-2 bg-slate-300 rounded-full"></span>
                        <span class="text-[8px] font-black uppercase text-slate-400 tracking-widest italic">Sincronizando...</span>
                    </div>
                </div>
            </div>
            <button onclick="toggleMenu()" class="p-3 bg-slate-50 rounded-xl text-slate-400">☰</button>
        </header>

        <main class="space-y-6">
            <img src="logo.png" class="h-14 mx-auto opacity-90 py-2">

            <div id="contador-card" class="hidden bg-slate-900 rounded-[2.5rem] p-8 text-white text-center shadow-2xl relative overflow-hidden">
                <p class="text-[9px] font-black opacity-40 uppercase tracking-widest mb-2 italic">Jornada Activa</p>
                <div id="timer-display" class="text-5xl font-black tracking-tighter trabajando">00:00:00</div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <button onclick="fichar('ENTRADA')" class="bg-slate-900 text-white py-10 rounded-[2rem] font-black uppercase text-[10px] tracking-widest shadow-xl active:scale-95 transition-all">Entrada</button>
                <button onclick="fichar('SALIDA')" class="bg-slate-50 text-slate-900 py-10 rounded-[2rem] font-black uppercase text-[10px] tracking-widest border border-slate-200 active:scale-95 transition-all">Salida</button>
            </div>

            <div class="bg-white rounded-[2rem] p-6 border border-slate-100 shadow-sm">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="text-[9px] font-black text-slate-300 uppercase tracking-widest italic">Asistencia Mensual</h3>
                    <span id="horas-mes" class="text-[10px] font-black text-slate-900 bg-slate-50 px-3 py-1 rounded-full italic">0h 0m</span>
                </div>
                <div id="calendario-personal" class="grid grid-cols-7 gap-1"></div>
            </div>

            <div class="bg-white rounded-[2rem] p-6 border border-slate-100 shadow-sm text-slate-900">
                <h3 class="text-[9px] font-black text-slate-300 uppercase tracking-widest mb-4 text-center italic">Hoy</h3>
                <div id="historial-hoy" class="space-y-3"></div>
            </div>

            <div class="bg-white rounded-[2.2rem] p-2 border border-slate-100 shadow-sm overflow-hidden">
                <iframe src="https://calendar.google.com/calendar/embed?src=3478be3d2663273cc95476e4cb032667d5c7d05eba69fe8bf3aa43b73d3f45f8%40group.calendar.google.com&ctz=Europe%2FMadrid&showTitle=0&showNav=1&showDate=0&showPrint=0&showTabs=0&showCalendars=0&mode=AGENDA" 
                style="border: 0" width="100%" height="320" frameborder="0" scrolling="no"></iframe>
            </div>
        </main>
    </div>

    <div id="side-menu" class="fixed inset-0 z-[120] translate-x-full transition-transform duration-300">
        <div class="absolute inset-0 bg-slate-900/10 backdrop-blur-md" onclick="toggleMenu()"></div>
        <div class="absolute right-0 top-0 h-full w-72 bg-white shadow-2xl p-6 flex flex-col">
            <div class="flex items-center justify-center mb-8"><img src="logo.png" class="h-10"></div>
            <div class="flex-1 overflow-y-auto no-scrollbar">
                <p class="section-label">General</p>
                <button onclick="toggleMenu()" class="nav-link"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path></svg> Dashboard</button>
                <button onclick="abrirDocumentos()" class="nav-link"><svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"></path></svg> Document
