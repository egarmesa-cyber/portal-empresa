<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona Mixta Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .trabajando { animation: pulse-soft 2s infinite; }
        .chat-container { height: 65vh; overflow-y: auto; scroll-behavior: smooth; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 overflow-x-hidden">

    <div id="side-menu" class="fixed inset-0 z-50 translate-x-full transition-transform duration-300 ease-in-out">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="toggleMenu()"></div>
        <div class="absolute right-0 top-0 h-full w-72 bg-white shadow-2xl p-8 flex flex-col">
            <button onclick="toggleMenu()" class="text-right text-slate-400 font-black mb-10 uppercase text-[10px] tracking-widest">✕ Cerrar</button>
            <div class="space-y-8 flex-1">
                <div>
                    <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] mb-4">Comunicación</h3>
                    <button onclick="abrirChat()" class="flex items-center gap-4 font-bold text-slate-700 hover:text-blue-600 w-full transition-all">
                        <span class="bg-blue-50 p-2 rounded-xl text-lg">💬</span> Chat de Equipo
                    </button>
                </div>
                <div>
                    <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-[0.2em] mb-4">Gestión</h3>
                    <button onclick="abrirDocumentos()" class="flex items-center gap-4 font-bold text-slate-700 hover:text-blue-600 w-full transition-all">
                        <span class="bg-slate-100 p-2 rounded-xl text-lg">📁</span> Mis Documentos
                    </button>
                </div>
            </div>
            <button onclick="logout()" class="mt-auto flex items-center gap-4 font-black text-rose-500 uppercase text-[10px] tracking-widest">
                <span class="bg-rose-50 p-2 rounded-lg text-base">🚪</span> Salir de la App
            </button>
        </div>
    </div>

    <div id="chat-window" class="fixed inset-0 z-[60] bg-white translate-y-full transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-5 border-b flex justify-between items-center bg-blue-600 text-white shadow-lg">
            <div class="flex items-center gap-2">
                <span class="text-xl">💬</span>
                <h2 class="font-black italic uppercase tracking-tighter">Chat Zona Mixta</h2>
            </div>
            <button onclick="cerrarChat()" class="font-black text-[10px] bg-white/20 px-3 py-1 rounded-full uppercase">Cerrar</button>
        </div>
        <div id="chat-mensajes" class="flex-1 p-4 overflow-y-auto space-y-4 bg-slate-50 chat-container">
            </div>
        <div class="p-4 border-t bg-white flex gap-2 shadow-[0_-4px_15px_rgba(0,0,0,0.05)]">
            <input type="text" id="chat-input" placeholder="Escribe al equipo..." class="flex-1 p-4 bg-slate-100 rounded-2xl outline-none font-medium focus:ring-2 focus:ring-blue-500">
            <button onclick="enviarMensaje()" class="bg-blue-600 text-white px-6 rounded-2xl font-black uppercase text-xs active:scale-95 transition-all">Enviar</button>
        </div>
    </div>

    <div id="login-section" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl w-full max-w-sm border border-slate-100 text-center">
            <img src="logo.png" class="h-24 mx-auto mb-6" onerror="this.src='https://via.placeholder.com/150?text=ZM'">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter">Zona Mixta</h2>
            <p class="text-slate-400 text-[10px] mb-8 font-black uppercase tracking-[0.3em] text-blue-600">Acceso Personal</p>
            <input type="text" id="username" placeholder="Tu Nombre" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 text-center font-bold outline-none focus:ring-2 focus:ring-blue-600">
            <button onclick="login()" class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-lg active:scale-95 transition-all">ENTRAR</button>
        </div>
    </div>

    <div id="app-section" class="hidden max-w-md mx-auto p-4 pb-12">
        <header class="flex justify-between items-center py-6">
            <div class="flex items-center gap-3 cursor-pointer group" onclick="toggleMenu()">
                <div class="relative">
                    <div class="w-14 h-14 rounded-full bg-blue-600 flex items-center justify-center text-white font-black text-2xl overflow-hidden shadow-lg ring-4 ring-white transition-transform group-active:scale-90">
                        <span id="user-initial"></span>
                        <img id="user-photo" class="hidden w-full h-full object-cover">
                    </div>
                    <div class="absolute -bottom-1 -right-1 bg-emerald-500 w-4 h-4 rounded-full border-2 border-white"></div>
                </div>
                <div>
                    <h1 class="text-lg font-black italic uppercase leading-none text-slate-800">Hola, <span id="user-display"></span></h1>
                    <p class="text-[9px] text-blue-600 font-black uppercase tracking-widest mt-1">Ver Perfil ➔</p>
                </div>
            </div>
            <img src="logo.png" class="h-10 opacity-10 grayscale" onerror="this.style.display='none'">
        </header>

        <div class="bg-blue-600 rounded-[2.2rem] p-6 shadow-blue-200 shadow-xl mb-6 text-white text-center relative overflow-hidden">
            <div class="relative z-10">
                <h3 class="text-[9px] font-black opacity-60 uppercase mb-1 tracking-[0.2em]">Comunicado</h3>
                <p id="muro-texto" class="text-sm font-bold italic leading-tight">Cargando avisos...</p>
            </div>
        </div>

        <div id="cronometro-box" class="hidden bg-white rounded-[2rem] p-5 mb-6 border border-slate-100 shadow-sm text-center">
            <p class="text-[9px] font-black text-slate-300 uppercase tracking-[0.2em] mb-1">Tiempo de Jornada</p>
            <div id="tiempo-transcurrido" class="text-4xl font-black text
