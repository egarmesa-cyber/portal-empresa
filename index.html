<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zona Mixta Pro + Chat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @keyframes pulse-soft { 0%, 100% { opacity: 1; } 50% { opacity: 0.7; } }
        .trabajando { animation: pulse-soft 2s infinite; }
        .chat-container { height: 60vh; overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen font-sans text-slate-900 overflow-x-hidden">

    <div id="side-menu" class="fixed inset-0 z-50 translate-x-full transition-transform duration-300 ease-in-out">
        <div class="absolute inset-0 bg-slate-900/40 backdrop-blur-sm" onclick="toggleMenu()"></div>
        <div class="absolute right-0 top-0 h-full w-72 bg-white shadow-2xl p-8 flex flex-col">
            <button onclick="toggleMenu()" class="text-right text-slate-400 font-black mb-10 uppercase text-xs">✕ Cerrar</button>
            <div class="space-y-8 flex-1">
                <div>
                    <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-4">Comunicación</h3>
                    <button onclick="abrirChat()" class="flex items-center gap-4 font-bold text-slate-700 hover:text-blue-600 w-full">
                        <span class="bg-blue-50 p-2 rounded-lg">💬</span> Chat de Equipo
                    </button>
                </div>
                <div>
                    <h3 class="text-[10px] font-black text-slate-300 uppercase tracking-widest mb-4">Gestión</h3>
                    <button onclick="abrirDocumentos()" class="flex items-center gap-4 font-bold text-slate-700 hover:text-blue-600 w-full">
                        <span class="bg-slate-100 p-2 rounded-lg">📁</span> Mis Documentos
                    </button>
                </div>
            </div>
            <button onclick="logout()" class="mt-auto font-black text-rose-500 uppercase text-xs">🚪 Cerrar Sesión</button>
        </div>
    </div>

    <div id="chat-window" class="fixed inset-0 z-[60] bg-white translate-y-full transition-transform duration-300 ease-in-out flex flex-col">
        <div class="p-6 border-b flex justify-between items-center bg-blue-600 text-white">
            <h2 class="font-black italic uppercase">Chat Zona Mixta</h2>
            <button onclick="cerrarChat()" class="font-black text-xs">CERRAR</button>
        </div>
        <div id="chat-mensajes" class="flex-1 p-4 overflow-y-auto space-y-4 bg-slate-50 chat-container text-sm">
            </div>
        <div class="p-4 border-t bg-white flex gap-2">
            <input type="text" id="chat-input" placeholder="Escribe un mensaje..." class="flex-1 p-3 bg-slate-100 rounded-xl outline-none">
            <button onclick="enviarMensaje()" class="bg-blue-600 text-white px-4 rounded-xl font-bold">Enviar</button>
        </div>
    </div>

    <div id="login-section" class="flex items-center justify-center min-h-screen p-4">
        <div class="bg-white p-8 rounded-[2.5rem] shadow-xl w-full max-w-sm border border-slate-100 text-center">
            <img src="logo.png" class="h-24 mx-auto mb-6" onerror="this.src='https://via.placeholder.com/150?text=ZM'">
            <h2 class="text-2xl font-black italic uppercase tracking-tighter">Zona Mixta</h2>
            <input type="text" id="username" placeholder="Tu nombre" class="w-full p-4 bg-slate-50 rounded-2xl mb-4 text-center font-bold outline-none focus:ring-2 focus:ring-blue-600">
            <button onclick="login()" class="w-full bg-slate-900 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all">ACCEDER</button>
        </div>
    </div>

    <div id="app-section" class="hidden max-w-md mx-auto p-4 pb-12">
        <header class="flex justify-between items-center py-6" onclick="toggleMenu()">
            <div class="flex items-center gap-3">
                <div id="user-photo-container">
                    <div class="w-12 h-12 rounded-full bg-blue-600 flex items-center justify-center text-white font-black text-xl overflow-hidden shadow-md">
                        <span id="user-initial"></span>
                        <img id="user-photo" class="hidden w-full h-full object-cover">
                    </div>
                </div>
                <h1 class="text-lg font-black italic uppercase leading-none">Hola, <span id="user-display"></span></h1>
            </div>
            <p class="text-[10px] font-black text-blue-600">MENÚ ☰</p>
        </header>

        <div class="bg-blue-600 rounded-[2.2rem] p-6 shadow-blue-200 shadow-xl mb-6 text-white text-center">
            <p id="muro-texto" class="text-sm font-bold">¡Bienvenido al equipo!</p>
        </div>

        <div class="bg-white rounded-[2.5rem] p-8 shadow-sm border border-slate-100 text-center mb-6">
            <div id="status" class="mb-6 text-[10px] font-black text-slate-300 uppercase italic">Control de Horario</div>
            <div class="grid grid-cols-2 gap-4">
                <button onclick="fichar('ENTRADA')" class="bg-emerald-500 text-white py-8 rounded-[1.8rem] font-black text-lg shadow-lg">ENTRADA</button>
                <button onclick="fichar('SALIDA')" class="bg-rose-500 text-white py-8 rounded-[1.8rem] font-black text-lg shadow-lg">SALIDA</button>
            </div>
        </div>
        
        <div class="bg-white rounded-[2.2rem] p-4 shadow-sm border border-slate-100 mb-6 calendario-container text-center">
            <h3 class="text-[10px] font-black text-slate-400 uppercase mb-4">Eventos</h3>
            <iframe src="https://calendar.google.com/calendar/embed?src=3478be3d2663273cc95476e4cb032667d5c7d05eba69fe8bf3aa43b73d3f45f8%40group.calendar.google.com&ctz=Europe%2FMadrid&showTitle=0&showNav=1&showDate=0&showPrint=0&showTabs=0&showCalendars=0&mode=AGENDA" 
                    style="border: 0" width="100%" height="250" frameborder="0" scrolling="no"></iframe>
        </div>
    </div>

    <script>
        const SUPABASE_URL = 'https://rxrgjpbxtyeypsfqmlfu.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_X2fBCNmVTPmgiPND_RrzOQ_8FpULiOm';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let currentUser = localStorage.getItem('usuario_empresa');
        let userFoto = "";

        if(currentUser) { mostrarApp(); }

        async function login() {
            const name = document.getElementById('username').value.trim();
            const pinInput = prompt("Introduce tu PIN:");
            const { data } = await _supabase.from('usuarios').select('*').eq('Nombre', name).eq('Pin', pinInput).single();
            if (data) { localStorage.setItem('usuario_empresa', name); currentUser = name; mostrarApp(); }
            else { alert("Error"); }
        }

        async function mostrarApp() {
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('app-section').classList.remove('hidden');
            document.getElementById('user-display').innerText = currentUser;
            const { data } = await _supabase.from('usuarios').select('foto').eq('Nombre', currentUser).single();
            if (data && data.foto) {
                userFoto = data.foto;
                document.getElementById('user-photo').src = data.foto;
                document.getElementById('user-photo').classList.remove('hidden');
            } else {
                document.getElementById('user-initial').innerText = currentUser.charAt(0).toUpperCase();
            }
            cargarAviso();
        }

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('translate-x-full'); }

        // --- FUNCIONES DEL CHAT ---
        function abrirChat() {
            document.getElementById('chat-window').classList.remove('translate-y-full');
            cargarMensajes();
            // Escuchar mensajes nuevos en tiempo real
            _supabase.channel('chat').on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'chat' }, payload => {
                dibujarMensaje(payload.new);
            }).subscribe();
        }

        function cerrarChat() { document.getElementById('chat-window').classList.add('translate-y-full'); }

        async function cargarMensajes() {
            const { data } = await _supabase.from('chat').select('*').order('created_at', { ascending: true }).limit(50);
            const contenedor = document.getElementById('chat-mensajes');
            contenedor.innerHTML = "";
            data.forEach(m => dibujarMensaje(m));
        }

        function dibujarMensaje(m) {
            const contenedor = document.getElementById('chat-mensajes');
            const esMio = m.nombre === currentUser;
            const div = document.createElement('div');
            div.className = `flex ${esMio ? 'justify-end' : 'justify-start'}`;
            div.innerHTML = `
                <div class="${esMio ? 'bg-blue-600 text-white rounded-l-2xl rounded-tr-2xl' : 'bg-white text-slate-800 rounded-r-2xl rounded-tl-2xl'} p-3 max-w-[80%] shadow-sm border border-slate-100">
                    <p class="text-[10px] font-black opacity-50 mb-1">${m.nombre}</p>
                    <p class="font-bold">${m.mensaje}</p>
                </div>
            `;
            contenedor.appendChild(div);
            contenedor.scrollTop = contenedor.scrollHeight;
        }

        async function enviarMensaje() {
            const input = document.getElementById('chat-input');
            const texto = input.value.trim();
            if (!texto) return;
            await _supabase.from('chat').insert([{ nombre: currentUser, mensaje: texto, foto: userFoto }]);
            input.value = "";
        }

        async function fichar(tipo) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                const coords = `${pos.coords.latitude}, ${pos.coords.longitude}`;
                await _supabase.from('fichajes').insert([{ Usuario: currentUser, Tipo: tipo, Ubicacion: coords }]);
                alert("Fichaje guardado");
            });
        }

        function logout() { localStorage.removeItem('usuario_empresa'); location.reload(); }
    </script>
</body>
</html>
